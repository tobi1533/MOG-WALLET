<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOG Wallet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070913;
  --bg2:#111521;
  --glass:rgba(15,20,35,.65);
  --glass-border:rgba(255,255,255,.08);
  --text:#fff;
  --text-dim:#96a0b7;
  --accent1:#5b8cff;
  --accent2:#8b5cf6;
  --accent3:#fbbf24;
  --danger:#ef4444;
  --success:#22c55e;
  --radius:16px;
  --shadow:0 10px 35px rgba(0,0,0,.45);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at top left,#13224f 0,#070913 35%),
radial-gradient(circle at bottom right,#321058 0,#070913 40%);
color:var(--text);
overflow-x:hidden
}
h1,h2,h3{font-family:'Space Grotesk',sans-serif}
.app{min-height:100vh}
.view{display:none;min-height:100vh}
.view.active{display:block}
.glass{
background:var(--glass);
backdrop-filter:blur(20px);
border:1px solid var(--glass-border);
border-radius:var(--radius);
box-shadow:var(--shadow)
}
.auth-wrap{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px
}
.brand{text-align:center;margin-bottom:30px}
.brand h1{
font-size:3rem;
background:linear-gradient(135deg,var(--accent1),var(--accent2),var(--accent3));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent
}
.logo-glow{
width:82px;height:82px;
margin:auto auto 15px;
border-radius:50%;
background:radial-gradient(circle,var(--accent2),transparent);
box-shadow:0 0 50px rgba(139,92,246,.6)
}
.auth-card{width:100%;max-width:420px;padding:24px}
.tabs{display:flex;gap:10px;margin-bottom:20px}
.tab{
flex:1;padding:10px;
background:transparent;border:none;
color:var(--text-dim);
cursor:pointer;
border-bottom:2px solid transparent
}
.tab.active{color:#fff;border-bottom-color:var(--accent1)}
.auth-form{display:none;flex-direction:column;gap:12px}
.auth-form.active{display:flex}
input,select{
width:100%;
padding:12px;
background:rgba(255,255,255,.05);
border:1px solid var(--glass-border);
border-radius:10px;
color:#fff;
outline:none
}
.btn-primary{
padding:12px;
background:linear-gradient(135deg,var(--accent1),var(--accent2));
border:none;
border-radius:10px;
color:#fff;
font-weight:600;
cursor:pointer
}
.btn-glass{
padding:10px 14px;
background:rgba(255,255,255,.04);
border:1px solid var(--glass-border);
border-radius:10px;
color:#fff;
cursor:pointer
}
.topbar{
display:flex;
align-items:center;
gap:15px;
padding:12px 16px;
position:sticky;
top:0;
z-index:100
}
.brand-mini{font-weight:700;font-size:1.2rem}
.wallet-switcher{
margin-left:auto;
display:flex;
align-items:center;
gap:8px;
padding:8px 12px;
border-radius:10px;
background:rgba(255,255,255,.04)
}
.main{padding:16px;padding-bottom:100px;max-width:650px;margin:auto}
.portfolio-card{padding:20px;margin-bottom:20px}
.portfolio-card h2{font-size:2.2rem;margin:10px 0}
.portfolio-change.positive{color:var(--success)}
.portfolio-actions{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
margin-top:16px
}
.section-tabs{display:flex;gap:10px;margin-bottom:16px}
.sectab{
padding:8px 14px;
background:transparent;
border:none;
color:var(--text-dim);
cursor:pointer;
border-bottom:2px solid transparent
}
.sectab.active{color:#fff;border-bottom-color:var(--accent1)}
.section-content{display:none}
.section-content.active{display:block}
.token-list,.trending-list,.activity-timeline{
display:flex;
flex-direction:column;
gap:12px
}
.token-item,.activity-item{
display:flex;
align-items:center;
gap:12px;
padding:12px;
background:rgba(255,255,255,.03);
border-radius:12px
}
.token-icon{
width:42px;height:42px;
border-radius:50%;
background:linear-gradient(135deg,var(--accent1),var(--accent2))
}
.token-info{flex:1}
.token-balance{text-align:right}
.nft-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px
}
.nft-card{
aspect-ratio:1;
background:rgba(255,255,255,.04);
border-radius:12px;
display:flex;
align-items:center;
justify-content:center
}
.bottom-nav{
display:flex;
justify-content:space-around;
align-items:center;
padding:10px;
position:fixed;
bottom:0;
left:0;
right:0;
z-index:100
}
.nav-btn{
background:transparent;
border:none;
color:var(--text-dim);
cursor:pointer
}
.nav-btn.active{color:var(--accent1)}
.nav-btn.fab{
width:56px;height:56px;
border-radius:50%;
background:linear-gradient(135deg,var(--accent1),var(--accent2));
color:#fff
}
.modal-overlay{
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,.72);
z-index:200;
align-items:center;
justify-content:center;
padding:20px
}
.modal-overlay.active{display:flex}
.modal{
display:none;
width:100%;
max-width:420px;
padding:20px
}
.close-btn{
background:transparent;
border:none;
color:#fff;
font-size:1.5rem;
cursor:pointer
}
.toast{
position:fixed;
top:20px;
right:20px;
background:rgba(0,0,0,.8);
padding:12px 16px;
border-radius:12px;
z-index:300
}
</style>
</head>
<body>

<div id="app" class="app">

<section id="authView" class="view active">
<div class="auth-wrap">

<div class="brand">
<div class="logo-glow"></div>
<h1>MOG</h1>
<p>Premium Web3 Wallet</p>
</div>

<div class="auth-card glass">

<div class="tabs">
<button class="tab active" data-tab="login">Login</button>
<button class="tab" data-tab="register">Register</button>
</div>

<form id="loginForm" class="auth-form active">
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<button class="btn-primary">Login</button>
</form>

<form id="registerForm" class="auth-form">
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Password" required>
<input type="password" placeholder="Confirm Password" required>
<button class="btn-primary">Create Account</button>
</form>

</div>
</div>
</section>

<section id="dashboardView" class="view">

<header class="topbar glass">
<div class="brand-mini">MOG Wallet</div>

<div class="wallet-switcher">
<span>Wallet 1</span>
</div>

<button class="btn-glass" id="settingsBtn">⚙</button>
</header>

<main class="main">

<div class="portfolio-card glass">
<div>Total Portfolio</div>
<h2 id="portfolioValue">$24,582.41</h2>
<div class="portfolio-change positive">+$1,240.32 • 5.32%</div>

<canvas id="portfolioChart" height="90"></canvas>

<div class="portfolio-actions">
<button class="btn-glass" data-modal="sendModal">Send</button>
<button class="btn-glass" data-modal="receiveModal">Receive</button>
<button class="btn-glass" data-modal="swapModal">Swap</button>
<button class="btn-glass" data-modal="buyModal">Buy</button>
</div>
</div>

<div class="section-tabs">
<button class="sectab active" data-section="assets">Assets</button>
<button class="sectab" data-section="nft">NFTs</button>
<button class="sectab" data-section="activity">Activity</button>
</div>

<div class="section-content active" id="assetsSection">
<div class="token-list" id="tokenList"></div>
<h3 style="margin:18px 0">Trending</h3>
<div class="trending-list" id="trendingList"></div>
</div>

<div class="section-content" id="nftSection">
<div class="nft-grid" id="nftGrid"></div>
</div>

<div class="section-content" id="activitySection">
<div class="activity-timeline" id="activityTimeline"></div>
</div>

</main>

<nav class="bottom-nav glass">
<button class="nav-btn active">🏠</button>
<button class="nav-btn">⇄</button>
<button class="nav-btn fab" data-modal="quickAction">+</button>
<button class="nav-btn">💰</button>
<button class="nav-btn">👤</button>
</nav>

</section>

<div class="modal-overlay" id="modalOverlay">

<div class="modal glass" id="sendModal">
<div style="display:flex;justify-content:space-between;margin-bottom:16px">
<h3>Send Crypto</h3>
<button class="close-btn">&times;</button>
</div>
<input placeholder="Recipient Address">
<input placeholder="Amount" style="margin-top:10px">
<button class="btn-primary" style="margin-top:14px;width:100%">Confirm</button>
</div>

<div class="modal glass" id="receiveModal">
<div style="display:flex;justify-content:space-between;margin-bottom:16px">
<h3>Receive</h3>
<button class="close-btn">&times;</button>
</div>
<div style="text-align:center">Wallet Address<br><br>0x1a2b...3c4d</div>
</div>

<div class="modal glass" id="swapModal">
<div style="display:flex;justify-content:space-between;margin-bottom:16px">
<h3>Swap</h3>
<button class="close-btn">&times;</button>
</div>
<input placeholder="From">
<input placeholder="To" style="margin-top:10px">
<button class="btn-primary" style="margin-top:14px;width:100%">Swap</button>
</div>

<div class="modal glass" id="buyModal">
<div style="display:flex;justify-content:space-between;margin-bottom:16px">
<h3>Buy Crypto</h3>
<button class="close-btn">&times;</button>
</div>
<input placeholder="Amount USD">
<button class="btn-primary" style="margin-top:14px;width:100%">Purchase</button>
</div>

</div>

</div>

<script>
const state={
tokens:[
{sym:"ETH",name:"Ethereum",bal:2.45,change:2.4},
{sym:"BTC",name:"Bitcoin",bal:.032,change:-1.2},
{sym:"SOL",name:"Solana",bal:15.2,change:5.8},
{sym:"BNB",name:"BNB",bal:4.1,change:0.9},
{sym:"USDT",name:"Tether",bal:1200,change:.01}
],
nfts:[1,2,3,4],
activity:[
{type:"SEND",token:"ETH",amount:"0.5",time:"2h ago"},
{type:"RECEIVE",token:"SOL",amount:"3.2",time:"1d ago"}
]
};

document.querySelectorAll(".tab").forEach(tab=>{
tab.onclick=()=>{
document.querySelectorAll(".tab,.auth-form").forEach(e=>e.classList.remove("active"));
tab.classList.add("active");
document.getElementById(tab.dataset.tab+"Form").classList.add("active");
};
});

document.getElementById("loginForm").onsubmit=e=>{
e.preventDefault();
document.getElementById("authView").classList.remove("active");
document.getElementById("dashboardView").classList.add("active");
initDashboard();
};

function initDashboard(){
renderTokens();
renderNFTs();
renderActivity();
drawChart();
}

function renderTokens(){
document.getElementById("tokenList").innerHTML=
state.tokens.map(t=>`
<div class="token-item">
<div class="token-icon"></div>
<div class="token-info"><strong>${t.sym}</strong><div>${t.name}</div></div>
<div class="token-balance">${t.bal}<br><span style="color:${t.change>=0?'#22c55e':'#ef4444'}">${t.change}%</span></div>
</div>`).join("");

document.getElementById("trendingList").innerHTML=
document.getElementById("tokenList").innerHTML;
}

function renderNFTs(){
document.getElementById("nftGrid").innerHTML=
state.nfts.map(n=>`<div class="nft-card">MOG #${n}</div>`).join("");
}

function renderActivity(){
document.getElementById("activityTimeline").innerHTML=
state.activity.map(a=>`
<div class="activity-item">
<div class="token-icon"></div>
<div><strong>${a.type} ${a.token}</strong><div>${a.amount} • ${a.time}</div></div>
</div>`).join("");
}

function drawChart(){
const c=document.getElementById("portfolioChart");
const ctx=c.getContext("2d");
ctx.strokeStyle="#8b5cf6";
ctx.lineWidth=2;
ctx.beginPath();
for(let i=0;i<50;i++){
let x=i*6;
let y=40+Math.sin(i/5)*18;
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
}
ctx.stroke();
}

document.querySelectorAll("[data-modal]").forEach(btn=>{
btn.onclick=()=>{
document.getElementById("modalOverlay").classList.add("active");
document.querySelectorAll(".modal").forEach(m=>m.style.display="none");
let modal=document.getElementById(btn.dataset.modal);
if(modal)modal.style.display="block";
};
});

document.querySelectorAll(".close-btn").forEach(btn=>{
btn.onclick=()=>document.getElementById("modalOverlay").classList.remove("active");
});

document.querySelectorAll(".sectab").forEach(btn=>{
btn.onclick=()=>{
document.querySelectorAll(".sectab,.section-content").forEach(e=>e.classList.remove("active"));
btn.classList.add("active");
document.getElementById(btn.dataset.section+"Section").classList.add("active");
};
});

document.getElementById("settingsBtn").onclick=()=>{
alert("Settings panel ready");
};
</script>

</body>
</html>
